name: Scrape articles

on:
  schedule:
    # Singapore = UTC+8. No DST.
    - cron: '0 23 * * *'   # 07:00 SGT (23:00 UTC previous day)
    - cron: '0 9 * * *'    # 17:00 SGT (09:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Run scraper
        run: npm run fetch

      - name: Commit if changed
        run: |
          git config user.name "english-learner-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain articles.json)" ]; then
            git add articles.json
            git commit -m "scrape: $(date -u +%Y-%m-%d) — $(jq '.article_count' articles.json) total"
            git push
          else
            echo "No changes."
          fi
